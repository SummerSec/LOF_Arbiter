name: Daily LOF ETL

on:
  schedule:
    # 北京时间 工作日 10:00–15:30 每半小时
    - cron: "0,30 10-15 * * 1-5"
      timezone: "Asia/Shanghai"
    # 北京时间 工作日 16:00
    - cron: "0 16 * * 1-5"
      timezone: "Asia/Shanghai"
  workflow_dispatch:
    inputs:
      full_sync:
        description: "Full sync (includes Jisilu)"
        type: boolean
        default: true

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: daily-etl-pages
  cancel-in-progress: false

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      docs_changed: ${{ steps.commit.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with remote before changes
        run: |
          git config user.name "lof-arbiter-bot"
          git config user.email "bot@lof-arbiter.dev"
          git fetch origin main
          git rebase origin/main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETL (akshare)
        run: |
          cd ${{ github.workspace }}
          python -m scripts.etl

      - name: Decide Jisilu sync
        id: jisilu
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.full_sync }}" = "true" ]; then
            echo "sync=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "0 10 * * 1-5" ]; then
            echo "sync=true" >> "$GITHUB_OUTPUT"
          else
            echo "sync=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync Jisilu
        if: steps.jisilu.outputs.sync == 'true'
        run: |
          cd ${{ github.workspace }}
          python -m scripts.jisilu

      - name: Generate report
        id: report
        run: |
          cd ${{ github.workspace }}
          python -c "
          from scripts.notify import write_daily_reports
          from datetime import datetime, timezone, timedelta
          bj = datetime.now(timezone(timedelta(hours=8)))
          paths = write_daily_reports(
              generated_at=bj.strftime('%Y-%m-%d %H:%M'),
              html_path='docs/index.html',
              md_path='/tmp/report.md',
          )
          print(paths['markdown'])
          "

      - name: Update daily GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/report.md', 'utf8');
            const body = `${report}\n\n---\n\n@SummerSec @Barry04`;

            const now = new Date();
            const bjTime = new Date(now.getTime() + 8 * 60 * 60 * 1000);
            const dateStr = bjTime.toISOString().substring(0, 10);
            const title = `【LOF套利日报】${dateStr}`;

            const { owner, repo } = context.repo;

            // 查找当日日报 Issue（同一天多次运行只更新同一条）
            const issues = await github.rest.issues.listForRepo({
              owner,
              repo,
              labels: ['daily-report'],
              state: 'all',
              sort: 'updated',
              direction: 'desc',
              per_page: 50,
            });

            const todayIssue = issues.data.find((issue) => issue.title === title);

            if (todayIssue) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: todayIssue.number,
                title,
                body: body,
                state: 'open',
              });
              console.log(`Updated issue #${todayIssue.number} for ${dateStr}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body: body,
                labels: ['daily-report'],
              });
              console.log(`Created issue #${created.data.number} for ${dateStr}`);
            }

            // 关闭非当日的 open 日报 Issue
            for (const issue of issues.data) {
              if (issue.state === 'open' && issue.title !== title) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  state: 'closed',
                });
                console.log(`Closed stale issue #${issue.number}: ${issue.title}`);
              }
            }

      - name: Commit and push changes
        id: commit
        run: |
          cd ${{ github.workspace }}
          git config user.name "lof-arbiter-bot"
          git config user.email "bot@lof-arbiter.dev"

          git add data/ docs/index.html

          if git diff --cached --quiet; then
            echo "No changes, skipping commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "data: daily ETL $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

  deploy:
    needs: etl
    if: needs.etl.outputs.docs_changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
