name: Daily LOF ETL

on:
  schedule:
    # 北京时间 13:00 = UTC 05:00
    - cron: "0 5 * * 1-5"
    # 北京时间 14:00 = UTC 06:00
    - cron: "0 6 * * 1-5"
  workflow_dispatch:
    inputs:
      full_sync:
        description: "Full sync (includes Jisilu)"
        type: boolean
        default: true

permissions:
  contents: write
  issues: write

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETL (akshare)
        run: |
          cd ${{ github.workspace }}
          python -m scripts.etl

      - name: Sync Jisilu
        if: ${{ github.event_name == 'schedule' || github.event.inputs.full_sync == 'true' }}
        run: |
          cd ${{ github.workspace }}
          python -m scripts.jisilu

      - name: Generate report
        id: report
        run: |
          cd ${{ github.workspace }}
          python -c "
          from scripts.notify import generate_report_text
          report = generate_report_text()
          print(report)
          " > /tmp/report.txt
          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/report.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/report.txt', 'utf8');

            const now = new Date();
            const bjTime = new Date(now.getTime() + 8 * 60 * 60 * 1000);
            const timeStr = bjTime.toISOString().replace('T', ' ').substring(0, 16);
            const dateStr = bjTime.toISOString().substring(0, 10);

            // Close yesterday's report issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['daily-report'],
              state: 'open',
              sort: 'created',
              direction: 'desc'
            });
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }

            // Create new report issue
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${dateStr} ${timeStr.substring(11)} LOF套利日报`,
              body: '```\n' + report + '\n```',
              labels: ['daily-report']
            });

      - name: Commit and push data
        run: |
          cd ${{ github.workspace }}
          git config user.name "lof-arbiter-bot"
          git config user.email "bot@lof-arbiter.dev"

          git add data/lof_arbiter.db data/*.csv -f 2>/dev/null || true
          git add data/ -f 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No data changes, skipping commit"
            exit 0
          fi

          git commit -m "data: daily ETL $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push
