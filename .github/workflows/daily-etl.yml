name: Daily LOF ETL

on:
  schedule:
    # 北京时间 13:00 = UTC 05:00
    - cron: "0 5 * * 1-5"
    # 北京时间 14:00 = UTC 06:00
    - cron: "0 6 * * 1-5"
  workflow_dispatch:
    inputs:
      full_sync:
        description: "Full sync (includes Jisilu)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL (akshare)
        id: etl
        run: |
          cd ${{ github.workspace }}
          python -m scripts.etl

      - name: Sync Jisilu
        if: ${{ github.event_name == 'schedule' || github.event.inputs.full_sync == 'true' }}
        run: |
          cd ${{ github.workspace }}
          python -m scripts.jisilu

      - name: Send email report
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: |
          cd ${{ github.workspace }}
          python -c "
          from scripts.notify import generate_report_text, send_report
          report = generate_report_text()
          print(report)
          send_report(report, subject_prefix='$(date +'%H:%M' -u) UTC')
          "

      - name: Commit and push data
        run: |
          cd ${{ github.workspace }}
          git config user.name "lof-arbiter-bot"
          git config user.email "bot@lof-arbiter.dev"

          git add data/lof_arbiter.db data/*.csv -f 2>/dev/null || true
          git add data/ -f 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No data changes, skipping commit"
            exit 0
          fi

          git commit -m "data: daily ETL $(date +'%Y-%m-%d %H:%M')"
          git push
